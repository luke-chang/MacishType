			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "# Stage <EngineID>Engine/Resources/ → bundle/Resources/<EngineID>/\n#\n# Naming convention: source folder name MUST end in exactly one \"Engine\"\n# suffix; bundle subdir = folder name with that suffix stripped.\n# (e.g. ExampleEngine → Example, JavaScriptEngine → JavaScript).\n#\n# Ownership: rsync only owns each engine's subdir (Resources/<EngineID>/);\n# it never touches root-level files like MenuIcon.tiff or AppIcon.icns.\n# If a sync exception is missing for some engine's Resources/, the default\n# Copy Resources phase will leave a stale flat-root copy that rsync\n# won't clean up — sync exceptions and rsync are coupled and must agree.\n\nset -eu\nDEST_ROOT=\"${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}\"\n\nfind \"${SRCROOT}/MacishType\" -type d -name \"Resources\" -path \"*Engine/Resources\" -print0 | \\\n    while IFS= read -r -d '' resources_dir; do\n        engine_dir=$(dirname \"$resources_dir\")\n        engine_name=$(basename \"$engine_dir\")\n        bundle_subdir=\"${engine_name%Engine}\"\n        mkdir -p \"$DEST_ROOT/$bundle_subdir\"\n        rsync -a --delete \"$resources_dir/\" \"$DEST_ROOT/$bundle_subdir/\"\n    done\n";
		};
